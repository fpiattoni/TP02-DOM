<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Document</title>
</head>
<body>
    <header></header>
    <main>
        <div class="fondo">
            <div id="notifications">
                <!-- 
                <div class="icon">
                    <span class="fa-regular fa-bell bell"></span>
                </div> 
                -->
            </div>
            <div class="sup">
                <input type="text" name="" class="input" placeholder="Escribe una tarea...">
                <button id="btnCrear" onclick="nuevaTarea()">Crear</button>   
            </div>
            <div class="inf">
                <ul id="lista">
                </ul>
            </div>
            <div class="inf-info">
                <div class="info">
                    <div>Completadas <span class="compSpan">0</span></div>
                    <div>Pendientes <span class="pendSpan">0</span></div>
                    <div>Total <span class="totalSpan">0</span></div>
                </div>
            </div>
        </div>
    </main>
    <footer></footer>
    <script src="./js/main.js"></script>
</body>
</html>
